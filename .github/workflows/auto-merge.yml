name: Auto-approve and merge Claude agent PRs

on:
  # Trigger when CI completes on a PR
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  auto-merge:
    name: Auto-approve & merge
    runs-on: ubuntu-latest
    # Only run when CI passed and the triggering workflow was for a PR
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'

    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Get PR number from workflow run
        id: get-pr
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.payload.workflow_run.id;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });
            // Match the PR whose head SHA equals the workflow run's head SHA
            const headSha = context.payload.workflow_run.head_sha;
            const pr = prs.find(p => p.head.sha === headSha);
            if (!pr) {
              core.setOutput('skip', 'true');
              return;
            }
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('head_branch', pr.head.ref);
            core.setOutput('skip', 'false');

      - name: Skip if not a claude/* branch
        id: check-branch
        if: steps.get-pr.outputs.skip == 'false'
        run: |
          branch="${{ steps.get-pr.outputs.head_branch }}"
          if [[ "$branch" == claude/* ]]; then
            echo "is_claude_branch=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_claude_branch=false" >> "$GITHUB_OUTPUT"
            echo "Branch '$branch' is not a claude/* branch — skipping auto-merge."
          fi

      - name: Approve PR
        if: >
          steps.get-pr.outputs.skip == 'false' &&
          steps.check-branch.outputs.is_claude_branch == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: Number('${{ steps.get-pr.outputs.pr_number }}'),
                event: 'APPROVE',
                body: 'Auto-approved: CI passed on a `claude/*` branch.',
              });
            } catch (err) {
              core.warning(`Could not approve PR (to enable, go to Settings → Actions → General → "Allow GitHub Actions to approve pull requests"): ${err.message}`);
            }

      - name: Enable auto-merge (squash)
        if: >
          steps.get-pr.outputs.skip == 'false' &&
          steps.check-branch.outputs.is_claude_branch == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = Number('${{ steps.get-pr.outputs.pr_number }}');
            // Try auto-merge first (requires the setting to be enabled in the repo)
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr_number,
                merge_method: 'squash',
              });
              console.log(`PR #${pr_number} merged successfully.`);
            } catch (err) {
              core.setFailed(`Merge failed: ${err.message}`);
            }
