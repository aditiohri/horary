[build]
  command = "npm run build:prod"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  framework = "#custom"
  command = "npm run dev:vite"
  targetPort = 5173
  port = 8888
  autoLaunch = false

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA redirect - only applies to production
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
